<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Age Calculator</h1>
        <p class="subtitle">Calculate your exact age in years, months, and days</p>

        <div class="row">
            <div class="input-group">
                <label for="day">Day</label>
                <input type="number" id="day" placeholder="DD" min="1" max="31">
            </div>
            <div class="input-group">
                <label for="month">Month</label>
                <select id="month">
                    <option value="">Select Month</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <div class="input-group">
                <label for="year">Year</label>
                <input type="number" id="year" placeholder="YYYY" min="1900" max="2026">
            </div>
        </div>

        <button onclick="calculateAge()">Calculate Age ➜</button>

        <div id="result" class="result">
            <div class="age-number" id="ageDisplay">-- years old</div>
            <div class="age-details">
                <div class="detail-card">
                    <div class="detail-value" id="yearsValue">0</div>
                    <div class="detail-label">Years</div>
                </div>
                <div class="detail-card">
                    <div class="detail-value" id="monthsValue">0</div>
                    <div class="detail-label">Months</div>
                </div>
                <div class="detail-card">
                    <div class="detail-value" id="daysValue">0</div>
                    <div class="detail-label">Days</div>
                </div>
            </div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
